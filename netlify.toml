[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "/og.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/make"
  to = "/make/"
  status = 301
